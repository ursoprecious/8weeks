name: Vercel 배포 실습

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # (선택) 여기서 테스트나 빌드 과정을 수행할 수 있습니다.
      # - name: Run Tests
      #   run: npm test

      - name: Vercel로 배포하기 (배달)
        uses: amondnet/vercel-action@v20 # 유명한 Vercel 배포 액션
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod' # 프로덕션으로 배포하라는 옵션
